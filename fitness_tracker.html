<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BEAST MODE">
<title>BEAST MODE — 8 Semanas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --bg2: #16161e;
  --bg3: #1e1e2a;
  --card: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --purple: #7c5cfc;
  --purple-dim: rgba(124,92,252,0.15);
  --teal: #00e5a0;
  --teal-dim: rgba(0,229,160,0.12);
  --coral: #ff6b4a;
  --coral-dim: rgba(255,107,74,0.12);
  --amber: #ffb627;
  --amber-dim: rgba(255,182,39,0.12);
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.12);
  --text: #f0f0f8;
  --text2: #8888aa;
  --text3: #444460;
  --radius: 14px;
  --radius-sm: 8px;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --nav-h: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); }
button { font-family: var(--font-body); cursor: pointer; border: none; background: none; color: var(--text); }
input, textarea { font-family: var(--font-body); color: var(--text); background: none; border: none; outline: none; -webkit-appearance: none; }
input[type=checkbox] { -webkit-appearance: checkbox; appearance: checkbox; }

/* HEADER */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.app-title { font-family: var(--font-head); font-size: 26px; font-weight: 800; letter-spacing: .04em; }
.app-title span { color: var(--purple); }
.week-badge {
  background: var(--purple-dim); border: 1px solid var(--purple);
  color: var(--purple); font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 99px;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-bottom);
  padding-top: 2px;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 8px 4px; color: var(--text3);
  font-size: 10px; font-weight: 500; transition: color .15s;
}
.nav-btn.active { color: var(--purple); }
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn.active svg { stroke-width: 2.2; }

/* PAGES */
.page { display: none; padding: 16px 16px 8px; animation: fadeUp .2s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

/* SECTION LABEL */
.sec-label {
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px; margin-top: 4px;
}

/* CARDS */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
}
.card-accent-purple { border-top: 2px solid var(--purple); }
.card-accent-teal { border-top: 2px solid var(--teal); }
.card-accent-coral { border-top: 2px solid var(--coral); }
.card-accent-amber { border-top: 2px solid var(--amber); }

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card {
  border-radius: var(--radius-sm); padding: 14px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.stat-card.purple { background: var(--purple-dim); border: 1px solid rgba(124,92,252,.3); }
.stat-card.teal { background: var(--teal-dim); border: 1px solid rgba(0,229,160,.3); }
.stat-card.coral { background: var(--coral-dim); border: 1px solid rgba(255,107,74,.3); }
.stat-card.amber { background: var(--amber-dim); border: 1px solid rgba(255,182,39,.3); }
.stat-lbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; opacity: .7; }
.stat-val { font-family: var(--font-head); font-size: 32px; font-weight: 800; line-height: 1; }
.stat-sub { font-size: 11px; opacity: .6; }
.stat-bar-bg { height: 3px; border-radius: 99px; background: rgba(255,255,255,.08); margin-top: 4px; }
.stat-bar { height: 3px; border-radius: 99px; transition: width .5s; }

/* PROGRESS RINGS ROW */
.rings-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.rings-row::-webkit-scrollbar { display: none; }
.ring-card {
  flex-shrink: 0; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 6px; width: 90px;
}
.ring-card canvas { width: 54px; height: 54px; }
.ring-name { font-size: 10px; font-weight: 500; color: var(--text2); text-align: center; line-height: 1.3; }
.ring-count { font-family: var(--font-head); font-size: 14px; font-weight: 700; }

/* BAR ROWS */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-lbl { font-size: 12px; color: var(--text2); width: 64px; flex-shrink: 0; }
.bar-bg { flex: 1; height: 6px; border-radius: 99px; background: var(--bg3); }
.bar-fill { height: 6px; border-radius: 99px; transition: width .4s; }
.bar-num { font-size: 12px; font-weight: 500; width: 28px; text-align: right; }

/* WEEK SELECTOR */
.week-sel { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 14px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.week-sel::-webkit-scrollbar { display: none; }
.week-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 99px;
  border: 1px solid var(--border); font-size: 13px; font-weight: 500;
  color: var(--text2); background: var(--bg3); transition: all .15s;
}
.week-pill.active { background: var(--purple); border-color: var(--purple); color: #fff; }

/* CHECKLIST TABLE */
.check-table { width: 100%; border-collapse: collapse; }
.check-table th { font-size: 11px; color: var(--text3); font-weight: 600; text-align: center; padding: 0 4px 8px; letter-spacing: .05em; }
.check-table th:first-child { text-align: left; }
.check-table td { padding: 6px 4px; border-top: 1px solid var(--border); text-align: center; }
.check-table td:first-child { text-align: left; font-size: 12px; font-weight: 500; color: var(--text2); }
.check-table input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--purple); cursor: pointer; }
.check-total { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--purple); }

/* DAY TABS */
.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 14px; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 7px 14px; border-radius: 99px;
  border: 1px solid var(--border); font-size: 13px; font-weight: 500;
  color: var(--text2); background: var(--bg3); transition: all .15s;
}
.day-tab.active { background: var(--teal); border-color: var(--teal); color: #0a1a12; }

/* MEAL ITEM */
.meal-item {
  padding: 14px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.meal-item:last-child { border-bottom: none; }
.meal-check-wrap { padding-top: 2px; flex-shrink: 0; }
.meal-check { width: 22px; height: 22px; accent-color: var(--teal); cursor: pointer; border-radius: 6px; }
.meal-info { flex: 1; min-width: 0; }
.meal-name-in {
  font-size: 14px; font-weight: 500; color: var(--text);
  width: 100%; background: transparent; border-bottom: 1px solid transparent;
  padding: 0 0 2px; transition: border-color .15s;
}
.meal-name-in:focus { border-color: var(--purple); }
.meal-done .meal-name-in { opacity: .4; text-decoration: line-through; }

/* INGREDIENT PILLS */
.ingr-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.ingr-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 99px;
  border: 1px solid var(--border); background: var(--bg3);
  font-size: 12px; color: var(--text2); cursor: pointer; transition: all .15s;
}
.ingr-pill.selected { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
.ingr-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .15s; }
.ingr-pill.selected .pill-dot { background: var(--teal); }

/* PROGRESS TABLE */
.prog-table { width: 100%; border-collapse: collapse; }
.prog-table th { font-size: 11px; color: var(--text3); font-weight: 600; padding: 0 8px 8px; text-align: left; }
.prog-table td { padding: 8px; border-top: 1px solid var(--border); vertical-align: middle; }
.prog-table input { font-size: 14px; color: var(--text); width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
.prog-table input:focus { border-color: var(--purple); }
.prog-week-lbl { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--purple); }
.prog-summary { display: flex; gap: 8px; padding: 10px 0; border-top: 1px solid var(--border); margin-top: 8px; }
.prog-sum-item { flex: 1; text-align: center; }
.prog-sum-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
.prog-sum-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* HABIT ROW */
.habit-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.habit-row:last-child { border-bottom: none; }
.habit-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; color: var(--text2); }
.habit-days { display: flex; gap: 4px; }
.habit-day-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg3); font-size: 10px; font-weight: 700; color: var(--text3);
  transition: all .12s; display: flex; align-items: center; justify-content: center;
}
.habit-day-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
.habit-score { font-family: var(--font-head); font-size: 14px; font-weight: 700; width: 32px; text-align: center; }

/* WORKOUT ROW */
.workout-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.workout-row:last-child { border-bottom: none; }
.workout-day-in { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--coral); width: 100%; margin-bottom: 4px; }
.workout-ex-in { font-size: 13px; color: var(--text2); width: 100%; line-height: 1.5; }

/* ADD BTN */
.add-btn {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  border: 1px dashed var(--border); color: var(--text3); font-size: 13px;
  font-weight: 500; margin-top: 8px; transition: all .15s;
}
.add-btn:active { background: var(--bg3); color: var(--text2); }

/* WEIGHT SPARKLINE */
.spark-wrap { display: flex; align-items: flex-end; gap: 5px; height: 64px; margin-top: 10px; }
.spark-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.spark-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 6px; transition: height .4s; }
.spark-bar-lbl { font-size: 9px; color: var(--text3); }

/* MEALS WEEKLY GRID */
.meal-week-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.meal-week-table th { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 2px 8px; }
.meal-week-table th:first-child { text-align: left; }
.meal-week-table td { text-align: center; padding: 5px 2px; border-top: 1px solid var(--border); }
.meal-week-table td:first-child { text-align: left; font-size: 11px; color: var(--text2); font-weight: 500; }
.meal-week-table input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--teal); }
.meal-week-total { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--teal); }

/* TOTALS ROW */
.totals-row td { background: var(--bg3); font-weight: 600; font-size: 12px; }

/* RING CANVAS */
svg.ring { transform: rotate(-90deg); }

/* TOAST */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--teal); color: #051a0f; font-size: 13px; font-weight: 500;
  padding: 10px 20px; border-radius: 99px; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* EMPTY STATE */
.empty { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">BEAST<span>MODE</span></div>
  <div class="week-badge" id="current-week-badge">Semana 1</div>
</header>

<!-- PAGES -->
<div id="page-dashboard" class="page active"></div>
<div id="page-workout" class="page"></div>
<div id="page-meals" class="page"></div>
<div id="page-progress" class="page"></div>
<div id="page-habits" class="page"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </button>
  <button class="nav-btn" onclick="showPage('workout',this)">
    <svg viewBox="0 0 24 24"><path d="M6 5v14M18 5v14M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>
    Gym
  </button>
  <button class="nav-btn" onclick="showPage('meals',this)">
    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>
    Comidas
  </button>
  <button class="nav-btn" onclick="showPage('progress',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progreso
  </button>
  <button class="nav-btn" onclick="showPage('habits',this)">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Hábitos
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const DAYS_SHORT = ['L','M','X','J','V','S','D'];
const WEEKS = 8;
const SESSIONS = ['Push','Pull','Piernas','Cardio','Upper','Lower'];

const ALL_INGREDIENTS = [
  '4 huevos','150g arroz cocido','100g repollo','150g repollo','200g repollo',
  '8oz pechuga de pollo','8oz carne molida 98/2','8oz masa de cerdo',
  '150g plátano maduro','200g sweet potato','100g arroz extra (día fuerte)',
];

const DEFAULT_STATE = {
  workouts: [
    {day:'Día 1 – Push', exercises:'Bench press, incline dumbbell press, shoulder press, lateral raises, triceps pushdown'},
    {day:'Día 2 – Pull', exercises:'Lat pulldown, seated row, face pulls, dumbbell curls, hammer curls'},
    {day:'Día 3 – Piernas', exercises:'Squat, Romanian deadlift, leg press, leg curl, calf raises'},
    {day:'Día 4 – Recuperación', exercises:'Caminar 30–40 min + movilidad'},
    {day:'Día 5 – Upper', exercises:'Incline bench press, pull-ups/lat pulldown, lateral raises, cable row, brazos'},
    {day:'Día 6 – Lower', exercises:'Deadlift, Bulgarian split squat, leg extension, hamstring curl, core'},
    {day:'Día 7 – Descanso', exercises:'Recuperación total'},
  ],
  meals: [
    {name:'Comida 1 — Post Entreno', ingredients:['4 huevos','150g arroz cocido','100g repollo']},
    {name:'Comida 2 — Almuerzo', ingredients:['8oz pechuga de pollo','150g arroz cocido','150g repollo']},
    {name:'Cena', ingredients:['8oz carne molida 98/2','200g repollo']},
  ],
  checklist: {},
  mealChecks: {},
  mealIngredients: {},
  progress: Array.from({length:8}, (_,i) => ({week:i+1,weight:'',waist:'',energy:'',strength:'',notes:''})),
  habits: {},
  habitNames: ['Entrenamiento','10k pasos / caminar','Comida limpia','Sin alcohol','Dormir 7+ horas'],
  activeMealDay: 0,
  activeProgressWeek: 0,
};

let S = JSON.parse(JSON.stringify(DEFAULT_STATE));
try { const d = localStorage.getItem('beastmode_v3'); if(d) S = {...DEFAULT_STATE,...JSON.parse(d)}; } catch(e){}

function save() {
  try { localStorage.setItem('beastmode_v3', JSON.stringify(S)); } catch(e){}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  render(id);
}

// ── RENDER ROUTER ──
function render(id) {
  if(id==='dashboard') renderDashboard();
  else if(id==='workout') renderWorkout();
  else if(id==='meals') renderMeals();
  else if(id==='progress') renderProgress();
  else if(id==='habits') renderHabits();
}

// ── RING SVG ──
function ringHTML(pct, color, size=54) {
  const r = (size-8)/2, c=size/2, circ=2*Math.PI*r;
  const dash = circ*Math.min(pct,1);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" stroke="rgba(255,255,255,.06)" stroke-width="6" fill="none"/>
    <circle cx="${c}" cy="${c}" r="${r}" stroke="${color}" stroke-width="6" fill="none"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
  </svg>`;
}

// ── DASHBOARD ──
function renderDashboard() {
  const totalSessions = Object.values(S.checklist).filter(Boolean).length;
  const maxSessions = SESSIONS.length * WEEKS;
  const habitChecks = Object.values(S.habits).filter(Boolean).length;
  const maxHabits = S.habitNames.length * 7;
  const mealChecks = Object.values(S.mealChecks).filter(Boolean).length;
  const maxMeals = S.meals.length * 7;
  const weights = S.progress.map(p=>parseFloat(p.weight)).filter(v=>!isNaN(v));
  const wChange = weights.length>=2 ? (weights[weights.length-1]-weights[0]).toFixed(1) : null;
  const wChangeStr = wChange!==null ? (parseFloat(wChange)<0?'':'+') + wChange + ' lb' : '—';
  const wColor = wChange&&parseFloat(wChange)<0 ? 'var(--teal)' : 'var(--amber)';

  const sessionCounts = Array.from({length:WEEKS}, (_,w) =>
    SESSIONS.reduce((sum,s) => sum+(S.checklist[`${s}_w${w+1}`]?1:0),0));
  const maxBar = SESSIONS.length;

  // Sparkline
  let sparkHTML = '';
  if(weights.length>0) {
    const mn=Math.min(...weights), mx=Math.max(...weights), rng=mx-mn||1;
    sparkHTML = weights.map((w,i) => {
      const h = Math.max(8, Math.round(((w-mn)/rng)*52)+8);
      const isLast = i===weights.length-1;
      return `<div class="spark-bar-wrap">
        <div class="spark-bar" style="height:${h}px;background:${isLast?'var(--teal)':'rgba(0,229,160,.35)'}"></div>
        <div class="spark-bar-lbl">S${i+1}</div>
      </div>`;
    }).join('');
  } else {
    sparkHTML = '<div class="empty" style="padding:16px">Sin datos</div>';
  }

  document.getElementById('page-dashboard').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card purple">
        <div class="stat-lbl" style="color:var(--purple)">Sesiones</div>
        <div class="stat-val" style="color:var(--purple)">${totalSessions}<span style="font-size:16px;opacity:.5">/${maxSessions}</span></div>
        <div class="stat-sub">completadas</div>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.round(totalSessions/maxSessions*100)}%;background:var(--purple)"></div></div>
      </div>
      <div class="stat-card teal">
        <div class="stat-lbl" style="color:var(--teal)">Hábitos</div>
        <div class="stat-val" style="color:var(--teal)">${habitChecks}<span style="font-size:16px;opacity:.5">/${maxHabits}</span></div>
        <div class="stat-sub">esta semana</div>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.round(habitChecks/maxHabits*100)}%;background:var(--teal)"></div></div>
      </div>
      <div class="stat-card coral">
        <div class="stat-lbl" style="color:var(--coral)">Comidas</div>
        <div class="stat-val" style="color:var(--coral)">${mealChecks}<span style="font-size:16px;opacity:.5">/${maxMeals}</span></div>
        <div class="stat-sub">confirmadas</div>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:${maxMeals?Math.round(mealChecks/maxMeals*100):0}%;background:var(--coral)"></div></div>
      </div>
      <div class="stat-card amber">
        <div class="stat-lbl" style="color:var(--amber)">Peso</div>
        <div class="stat-val" style="color:${wColor};font-size:22px">${wChangeStr}</div>
        <div class="stat-sub">cambio total</div>
      </div>
    </div>

    <div class="sec-label">Progreso por sesión</div>
    <div class="card card-accent-purple">
      <div class="rings-row">
        ${SESSIONS.map(s => {
          const done = Array.from({length:WEEKS},(_,w)=>S.checklist[`${s}_w${w+1}`]?1:0).reduce((a,b)=>a+b,0);
          const pct = done/WEEKS;
          const colors = {Push:'#7c5cfc',Pull:'#4d9fff',Piernas:'#ff6b4a',Cardio:'#00e5a0',Upper:'#ffb627',Lower:'#ed7ef7'};
          return `<div class="ring-card">
            ${ringHTML(pct, colors[s]||'#7c5cfc')}
            <div class="ring-name">${s}</div>
            <div class="ring-count" style="color:${colors[s]||'#7c5cfc'}">${done}/${WEEKS}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="sec-label">Sesiones por semana</div>
    <div class="card card-accent-coral">
      ${sessionCounts.map((c,i) => `
        <div class="bar-row">
          <div class="bar-lbl">Semana ${i+1}</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(c/maxBar*100)}%;background:${c===maxBar?'var(--coral)':c>=3?'rgba(255,107,74,.6)':'rgba(255,107,74,.25)'}"></div></div>
          <div class="bar-num" style="color:${c===maxBar?'var(--coral)':'var(--text3)'}">${c}/${maxBar}</div>
        </div>`).join('')}
    </div>

    <div class="sec-label">Peso corporal (lb)</div>
    <div class="card card-accent-teal">
      <div class="spark-wrap">${sparkHTML}</div>
      ${weights.length>=2?`<div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--text2)">
        <span>Inicio: <b style="color:var(--text)">${weights[0]} lb</b></span>
        <span>Ahora: <b style="color:var(--teal)">${weights[weights.length-1]} lb</b></span>
      </div>`:''}
    </div>

    <div class="sec-label">Checklist de entrenamientos</div>
    <div class="card card-accent-purple" style="overflow-x:auto">
      <table class="check-table" style="min-width:420px">
        <thead><tr>
          <th>Sesión</th>
          ${Array.from({length:WEEKS},(_,w)=>`<th>S${w+1}</th>`).join('')}
          <th style="color:var(--purple)">✓</th>
        </tr></thead>
        <tbody>
          ${SESSIONS.map(s => {
            const done = Array.from({length:WEEKS},(_,w)=>S.checklist[`${s}_w${w+1}`]?1:0).reduce((a,b)=>a+b,0);
            return `<tr>
              <td>${s}</td>
              ${Array.from({length:WEEKS},(_,w)=>{
                const k=`${s}_w${w+1}`;
                return `<td><input type="checkbox" ${S.checklist[k]?'checked':''} onchange="S.checklist['${k}']=this.checked;save();renderDashboard()"></td>`;
              }).join('')}
              <td><span class="check-total" style="color:${done===8?'var(--teal)':'var(--text3)'}">${done}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr class="totals-row">
            <td>Total</td>
            ${Array.from({length:WEEKS},(_,w)=>{
              const c=SESSIONS.reduce((sum,s)=>sum+(S.checklist[`${s}_w${w+1}`]?1:0),0);
              return `<td style="color:${c===SESSIONS.length?'var(--teal)':'var(--text2)'}"><b>${c}</b></td>`;
            }).join('')}
            <td style="color:var(--purple)"><b>${totalSessions}</b></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

// ── WORKOUT ──
function renderWorkout() {
  document.getElementById('page-workout').innerHTML = `
    <div class="sec-label">Tu rutina semanal</div>
    <div class="card">
      ${S.workouts.map((w,i) => `
        <div class="workout-row">
          <input class="workout-day-in" value="${w.day}" oninput="S.workouts[${i}].day=this.value;save()" placeholder="Nombre del día">
          <input class="workout-ex-in" value="${w.exercises}" oninput="S.workouts[${i}].exercises=this.value;save()" placeholder="Ejercicios...">
        </div>`).join('')}
      <button class="add-btn" onclick="S.workouts.push({day:'Nuevo día',exercises:''});save();renderWorkout()">+ Añadir día</button>
    </div>
  `;
}

// ── MEALS ──
function renderMeals() {
  const d = S.activeMealDay;
  document.getElementById('page-meals').innerHTML = `
    <div class="sec-label">Selecciona el día</div>
    <div class="day-tabs">
      ${DAYS_SHORT.map((day,i) => `
        <button class="day-tab ${d===i?'active':''}" onclick="S.activeMealDay=${i};save();renderMeals()">${day}</button>`).join('')}
    </div>
    <div class="sec-label">Comidas del día</div>
    <div class="card card-accent-teal">
      ${S.meals.map((m,mi) => {
        const k = `m${mi}_d${d}`;
        const done = !!S.mealChecks[k];
        const selIngr = S.mealIngredients[`${mi}`] || m.ingredients;
        return `<div class="meal-item ${done?'meal-done':''}">
          <div class="meal-check-wrap">
            <input type="checkbox" class="meal-check" ${done?'checked':''} onchange="S.mealChecks['${k}']=this.checked;save();renderMeals();toast(this.checked?'✓ Comida marcada!':'Desmarcado')">
          </div>
          <div class="meal-info">
            <input class="meal-name-in" value="${m.name}" oninput="S.meals[${mi}].name=this.value;save()">
            <div class="ingr-pills">
              ${ALL_INGREDIENTS.map(ingr => {
                const isSel = selIngr.includes(ingr);
                return `<div class="ingr-pill ${isSel?'selected':''}" onclick="toggleIngr(${mi},'${ingr.replace(/'/g,"\\'")}')">
                  <div class="pill-dot"></div>${ingr}
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
      <button class="add-btn" onclick="S.meals.push({name:'Nueva comida',ingredients:[]});save();renderMeals()">+ Añadir comida</button>
    </div>

    <div class="sec-label">Resumen semanal de comidas</div>
    <div class="card" style="overflow-x:auto">
      <table class="meal-week-table" style="min-width:340px">
        <thead><tr>
          <th>Comida</th>
          ${DAYS_SHORT.map(d=>`<th>${d}</th>`).join('')}
          <th>✓</th>
        </tr></thead>
        <tbody>
          ${S.meals.map((m,mi) => {
            const tot = DAYS_SHORT.reduce((sum,_,di)=>sum+(S.mealChecks[`m${mi}_d${di}`]?1:0),0);
            return `<tr>
              <td style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name.split('—')[0].trim()}</td>
              ${DAYS_SHORT.map((_,di)=>`<td><input type="checkbox" ${S.mealChecks[`m${mi}_d${di}`]?'checked':''} onchange="S.mealChecks['m${mi}_d${di}']=this.checked;save();renderMeals()"></td>`).join('')}
              <td><span class="meal-week-total" style="color:${tot===7?'var(--teal)':'var(--text3)'}">${tot}/7</span></td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr class="totals-row">
            <td>Total</td>
            ${DAYS_SHORT.map((_,di)=>{
              const c=S.meals.reduce((sum,_,mi)=>sum+(S.mealChecks[`m${mi}_d${di}`]?1:0),0);
              return `<td style="color:${c===S.meals.length?'var(--teal)':'var(--text2)'}">${c}</td>`;
            }).join('')}
            <td style="color:var(--teal)"><b>${Object.values(S.mealChecks).filter(Boolean).length}</b></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

function toggleIngr(mealIdx, ingr) {
  if (!S.mealIngredients[mealIdx]) S.mealIngredients[mealIdx] = [...S.meals[mealIdx].ingredients];
  const arr = S.mealIngredients[mealIdx];
  const i = arr.indexOf(ingr);
  if(i>=0) arr.splice(i,1); else arr.push(ingr);
  S.meals[mealIdx].ingredients = arr;
  save();
  renderMeals();
}

// ── PROGRESS ──
function renderProgress() {
  const wi = S.activeProgressWeek;
  const p = S.progress[wi];
  const weights = S.progress.map(x=>parseFloat(x.weight)).filter(v=>!isNaN(v));
  const wChange = weights.length>=2?(weights[weights.length-1]-weights[0]).toFixed(1):null;

  document.getElementById('page-progress').innerHTML = `
    <div class="sec-label">Selecciona semana</div>
    <div class="week-sel">
      ${S.progress.map((pw,i) => `
        <button class="week-pill ${wi===i?'active':''}" onclick="S.activeProgressWeek=${i};save();renderProgress()">Semana ${i+1}</button>`).join('')}
    </div>
    <div class="sec-label">Semana ${wi+1}</div>
    <div class="card card-accent-purple">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Peso (lb)</div>
          <input style="font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--purple);width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px" type="number" value="${p.weight}" placeholder="0" oninput="S.progress[${wi}].weight=this.value;save()">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Cintura (in)</div>
          <input style="font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--coral);width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px" type="text" value="${p.waist}" placeholder="—" oninput="S.progress[${wi}].waist=this.value;save()">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Energía (1-5)</div>
          <div style="display:flex;gap:6px">
            ${[1,2,3,4,5].map(n=>`<button onclick="S.progress[${wi}].energy='${n}';save();renderProgress()" style="flex:1;padding:8px 0;border-radius:6px;border:1px solid ${p.energy==n?'var(--amber)':'var(--border)'};background:${p.energy==n?'var(--amber-dim)':'var(--bg3)'};color:${p.energy==n?'var(--amber)':'var(--text3)'};font-family:var(--font-head);font-size:16px;font-weight:700">${n}</button>`).join('')}
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Fuerza (1-5)</div>
          <div style="display:flex;gap:6px">
            ${[1,2,3,4,5].map(n=>`<button onclick="S.progress[${wi}].strength='${n}';save();renderProgress()" style="flex:1;padding:8px 0;border-radius:6px;border:1px solid ${p.strength==n?'var(--blue)':'var(--border)'};background:${p.strength==n?'var(--blue-dim)':'var(--bg3)'};color:${p.strength==n?'var(--blue)':'var(--text3)'};font-family:var(--font-head);font-size:16px;font-weight:700">${n}</button>`).join('')}
          </div>
        </div>
      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Notas</div>
        <textarea style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;color:var(--text);resize:none;height:72px;font-family:var(--font-body)" placeholder="¿Cómo te sentiste esta semana?" oninput="S.progress[${wi}].notes=this.value;save()">${p.notes||''}</textarea>
      </div>
    </div>

    <div class="sec-label">Resumen 8 semanas</div>
    <div class="card">
      ${wChange!==null?`<div class="prog-summary">
        <div class="prog-sum-item"><div class="prog-sum-val" style="color:${parseFloat(wChange)<0?'var(--teal)':'var(--amber)'}">${parseFloat(wChange)<0?'':'+'}${wChange} lb</div><div class="prog-sum-lbl">Cambio total</div></div>
        <div class="prog-sum-item"><div class="prog-sum-val" style="color:var(--purple)">${weights[0]} lb</div><div class="prog-sum-lbl">Peso inicial</div></div>
        <div class="prog-sum-item"><div class="prog-sum-val" style="color:var(--teal)">${weights[weights.length-1]} lb</div><div class="prog-sum-lbl">Peso actual</div></div>
      </div>`:'<div class="empty">Ingresa tu peso semana a semana para ver el progreso</div>'}
      <table class="check-table" style="margin-top:8px">
        <thead><tr><th>Sem</th><th>Peso</th><th>Cintura</th><th>Energía</th><th>Fuerza</th></tr></thead>
        <tbody>
          ${S.progress.map((pw,i)=>`<tr onclick="S.activeProgressWeek=${i};save();renderProgress()" style="cursor:pointer;${wi===i?'background:var(--purple-dim)':''}">
            <td style="color:var(--purple);font-weight:700">S${i+1}</td>
            <td>${pw.weight||'—'}</td>
            <td>${pw.waist||'—'}</td>
            <td>${pw.energy?'★'.repeat(parseInt(pw.energy)):'—'}</td>
            <td>${pw.strength?'★'.repeat(parseInt(pw.strength)):'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ── HABITS ──
function renderHabits() {
  const totPerHabit = S.habitNames.map((_,hi) => DAYS_SHORT.reduce((sum,_,di)=>sum+(S.habits[`h${hi}_d${di}`]?1:0),0));
  const grand = totPerHabit.reduce((a,b)=>a+b,0);
  const maxGrand = S.habitNames.length * 7;

  document.getElementById('page-habits').innerHTML = `
    <div class="sec-label">Hábitos diarios</div>
    <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="stat-card purple" style="padding:10px">
        <div class="stat-lbl" style="color:var(--purple);font-size:10px">Total</div>
        <div class="stat-val" style="color:var(--purple);font-size:24px">${grand}</div>
        <div class="stat-sub" style="font-size:10px">de ${maxGrand}</div>
      </div>
      <div class="stat-card teal" style="padding:10px">
        <div class="stat-lbl" style="color:var(--teal);font-size:10px">Tasa</div>
        <div class="stat-val" style="color:var(--teal);font-size:24px">${Math.round(grand/maxGrand*100)}%</div>
        <div class="stat-sub" style="font-size:10px">cumplimiento</div>
      </div>
      <div class="stat-card amber" style="padding:10px">
        <div class="stat-lbl" style="color:var(--amber);font-size:10px">Mejor</div>
        <div class="stat-val" style="color:var(--amber);font-size:24px">${Math.max(...totPerHabit)}/7</div>
        <div class="stat-sub" style="font-size:10px">hábito top</div>
      </div>
    </div>
    <div class="card card-accent-purple">
      ${S.habitNames.map((h,hi) => {
        const score = totPerHabit[hi];
        const col = score>=6?'var(--teal)':score>=4?'var(--amber)':'var(--text3)';
        return `<div class="habit-row">
          <div class="habit-name">${h}</div>
          <div class="habit-days">
            ${DAYS_SHORT.map((day,di) => {
              const k=`h${hi}_d${di}`;
              const active = !!S.habits[k];
              return `<button class="habit-day-btn ${active?'active':''}" onclick="S.habits['h${hi}_d${di}']=!S.habits['h${hi}_d${di}'];save();renderHabits();toast(S.habits['h${hi}_d${di}']?'Hábito completado':'Desmarcado')">${day}</button>`;
            }).join('')}
          </div>
          <div class="habit-score" style="color:${col}">${score}/7</div>
        </div>`;
      }).join('')}
    </div>
    <div class="sec-label">Progreso por hábito</div>
    <div class="card">
      ${S.habitNames.map((h,hi) => {
        const sc = totPerHabit[hi];
        const pct = Math.round(sc/7*100);
        const col = sc>=6?'var(--teal)':sc>=4?'var(--amber)':'var(--coral)';
        return `<div class="bar-row">
          <div class="bar-lbl" style="font-size:11px;width:100px">${h.split(' ').slice(0,2).join(' ')}</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
          <div class="bar-num" style="color:${col}">${pct}%</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// Init
renderDashboard();

// Update week badge
const currentWeek = Math.min(S.activeProgressWeek+1, 8);
document.getElementById('current-week-badge').textContent = `Semana ${currentWeek}`;
</script>
</body>
</html>
